<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>500 - Something went wrong</title>
    <style>
        :root {
            --cyber-purple: #8a2be2;
            --cyber-indigo: #4b0082;
            --terminal-bg: #0a0a0b;
            --ui-border: #2a2a2e;
            --ui-accent: #3d3d42;
            --text-main: #e1e1e6;
            --text-dim: #88888e;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            background-color: #0f0f11;
            background-image: 
                linear-gradient(var(--glass) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            padding: 50px;
            background: rgba(15,15,17,0.9);
            border: 2px solid var(--ui-border);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(138,43,226,0.2);
        }
        .error-container h1 {
            font-size: 4rem;
            color: var(--cyber-purple);
            margin-bottom: 0.5rem;
        }
        .error-container p {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .error-container a {
            display: inline-block;
            padding: 15px 30px;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            background: var(--cyber-purple);
            border-radius: 8px;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(138,43,226,0.3);
            transition: 0.2s;
        }
        .error-container a:hover {
            background: #fff;
            color: #000;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>400</h1>
        <p>Oops! Something went wrong on our side.</p>
        <a href="/">Go back home</a>
    </div>
</body>
</html>

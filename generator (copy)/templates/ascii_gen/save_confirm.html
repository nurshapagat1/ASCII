{% extends "base.html" %}
{% load static %}
<link rel="stylesheet" href="{% static 'generator/index.css' %}">
{% block content %}
<section class="module-section" style="max-width: 700px; margin: 40px auto;">
    <div class="sticker blue">PRE_COMMIT_VALIDATION</div>
    
    <div class="card">
        <div class="card-header">
            <span class="header-text">VERIFY_DATA_INTEGRITY</span>
            <span class="header-text">REV_02</span>
        </div>

        <div class="ascii-canvas" style="height: 300px; overflow: hidden;">
            <pre>{{ ascii_data }}</pre>
        </div>

        <div style="padding: 40px;">
            <form method="POST" action="{% url 'save_ascii' %}">
                {% csrf_token %}
                <input type="hidden" name="ascii_data" value="{{ ascii_data }}">
                
                <label class="header-text">FILE_DESIGNATION</label>
                <input type="text" name="title" class="title-input" value="{{ title }}" required>
                
                <div style="margin: 30px 0; display: flex; align-items: center; gap: 12px;">
                    <input type="checkbox" name="make_public" id="pubCheck" {% if make_public %}checked{% endif %} style="width: 20px; height: 20px;">
                    <label for="pubCheck" class="header-text" style="color: var(--neon-blue); cursor: pointer;">BROADCAST_TO_PUBLIC_GALLERY</label>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
                    <a href="{% url 'index' %}" class="copy-tag" style="justify-content: center; text-decoration: none;">ABORT</a>
                    <button type="submit" class="primary-btn">CONFIRM_SAVE ↗</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}

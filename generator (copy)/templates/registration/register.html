{% extends "base.html" %}
{% load static %}
<link rel="stylesheet" href="{% static 'generator/index.css' %}">
{% block content %}
<section class="module-section" style="max-width: 450px; margin: 0 auto;">
    
    <div class="card">
        <div class="sticker pink">NEW_UNIT</div>
        
        <div class="card-header">
            <span class="header-text">UNIT_INITIALIZATION</span>
            <span class="header-text">[PENDING]</span>
        </div>

        {% if messages %}
        <div style="padding: 20px 20px 0;">
            {% for message in messages %}
                <div class="sticker pink" style="position: relative; top: 0; left: 0; transform: none; display: block; text-align: center;">
                    ERROR: {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" style="padding: 40px;">
            {% csrf_token %}
            
            <label class="header-text">DESIGNATE_USERNAME</label>
            <input type="text" name="username" class="title-input" placeholder="ASCII_GHOST" required>

            <label class="header-text">CONTACT_EMAIL</label>
            <input type="email" name="email" class="title-input" placeholder="UNIT@NETWORK.COM" required>

            <label class="header-text">SET_PASSKEY</label>
            <input type="password" name="password" class="title-input" placeholder="********" required>

            <label class="header-text">CONFIRM_PASSKEY</label>
            <input type="password" name="password_confirm" class="title-input" placeholder="********" required>

            <button type="submit" class="primary-btn" style="background: var(--accent-secondary);">
                ESTABLISH_CONNECTION ↗
            </button>
        </form>
        <!-- In register.html -->
<div class="terms-agreement">
    <input type="checkbox" name="accept_terms" id="accept_terms" required>
    <label for="accept_terms">
        I agree to the <a href="{% url 'terms' %}" target="_blank">Terms of Use</a> 
        and <a href="{% url 'privacy' %}" target="_blank">Privacy Policy</a>
    </label>
</div>
        <div style="padding: 20px; text-align: center; border-top: var(--border); background: var(--bg-color);">
            <a href="{% url 'login' %}" class="header-text" style="text-decoration: none; color: #666;">ALREADY_INITIALIZED? LOGIN_HERE</a>
        </div>
    </div>
</section>
{% endblock %}
